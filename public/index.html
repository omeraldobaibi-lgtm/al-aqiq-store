<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>متجر العقيق</title>
  <style>
    body{margin:0;background:#06122f;color:#fff;font-family:Tahoma,Arial,sans-serif}
    .wrap{max-width:1100px;margin:auto;padding:20px}
    h1,h2{margin:0 0 16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
    .card{background:#0b1b47;border:1px solid #1d3d8f;border-radius:18px;padding:16px}
    button{background:#37c95d;color:#05210d;border:none;border-radius:12px;padding:12px 16px;font-weight:bold;cursor:pointer}
    .secondary{background:#142a66;color:#fff}
    input,textarea,select{width:100%;box-sizing:border-box;padding:12px;border-radius:12px;border:1px solid #2a468f;background:#08183e;color:#fff}
    textarea{min-height:90px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .muted{opacity:.8}
    .total{font-size:24px;font-weight:bold}
    .success{background:#0d4f33;padding:14px;border-radius:14px;margin-top:14px;display:none}
    @media(max-width:700px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>متجر العقيق</h1>
    <p class="muted">نسخة جاهزة للعمل محليًا أو للنشر على Render.</p>

    <div class="grid" id="products"></div>

    <div class="card" style="margin-top:20px">
      <h2>سلة المشتريات</h2>
      <div id="cartList" class="muted">السلة فارغة حاليًا.</div>
      <div style="margin:16px 0" class="total">الإجمالي: <span id="total">0</span> ر.ي</div>

      <div class="row">
        <input id="customerName" placeholder="الاسم الكامل">
        <input id="customerPhone" placeholder="رقم الجوال">
      </div>
      <div class="row" style="margin-top:12px">
        <input id="customerArea" placeholder="المدينة / المنطقة">
        <input id="customerPay" placeholder="طريقة الدفع">
      </div>
      <div style="margin-top:12px">
        <textarea id="customerNotes" placeholder="ملاحظات الطلب"></textarea>
      </div>

      <div style="display:flex;gap:12px;margin-top:14px;flex-wrap:wrap">
        <button id="submitBtn">إرسال الطلب إلى السيرفر</button>
        <button class="secondary" id="clearBtn">تفريغ السلة</button>
      </div>

      <div id="successBox" class="success"></div>
    </div>
  </div>

  <script>
    const cart = new Map();
    const productsEl = document.getElementById('products');
    const cartListEl = document.getElementById('cartList');
    const totalEl = document.getElementById('total');
    const successBox = document.getElementById('successBox');

    function money(v){ return Number(v || 0).toLocaleString('ar-SA'); }

    function renderCart() {
      const items = [...cart.values()];
      if (!items.length) {
        cartListEl.innerHTML = 'السلة فارغة حاليًا.';
        totalEl.textContent = '0';
        return;
      }
      let total = 0;
      cartListEl.innerHTML = items.map(item => {
        const line = item.price * item.qty;
        total += line;
        return `
          <div class="card" style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;gap:8px;align-items:center">
              <strong>${item.title}</strong>
              <span>${money(item.price)} ر.ي / ${item.unit}</span>
            </div>
            <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;margin-top:10px">
              <div>
                <button onclick="changeQty('${item.id}', -1)" class="secondary">-</button>
                <span style="padding:0 10px">${item.qty}</span>
                <button onclick="changeQty('${item.id}', 1)" class="secondary">+</button>
              </div>
              <strong>${money(line)} ر.ي</strong>
            </div>
          </div>`;
      }).join('');
      totalEl.textContent = money(total);
    }

    function addToCart(product) {
      const existing = cart.get(product.id) || { ...product, qty: 0 };
      existing.qty += 1;
      cart.set(product.id, existing);
      renderCart();
    }

    function changeQty(id, delta) {
      const item = cart.get(id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) cart.delete(id);
      else cart.set(id, item);
      renderCart();
    }

    async function loadProducts() {
      const res = await fetch('/api/products');
      const products = await res.json(); window.__products = products;
      productsEl.innerHTML = products.map(product => `
        <div class="card">
          <h3>${product.title}</h3>
          <p class="muted">${product.description || ''}</p>
          <p><strong>${money(product.price)} ر.ي</strong> / ${product.unit}</p>
          <button onclick="addToCart(window.__products.find(p => p.id === '${product.id}'))">أضف إلى السلة</button>
        </div>
      `).join('');
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      cart.clear();
      renderCart();
    });

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const payload = {
        customerName: document.getElementById('customerName').value,
        customerPhone: document.getElementById('customerPhone').value,
        customerArea: document.getElementById('customerArea').value,
        customerPay: document.getElementById('customerPay').value,
        customerNotes: document.getElementById('customerNotes').value,
        items: [...cart.values()].map(item => ({ id: item.id, qty: item.qty }))
      };

      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      successBox.style.display = 'block';
      successBox.textContent = data.message + (data.orderId ? ' رقم الطلب: ' + data.orderId : '');

      if (data.ok) {
        cart.clear();
        renderCart();
      }
    });

    loadProducts();
    renderCart();
  </script>
</body>
</html>
